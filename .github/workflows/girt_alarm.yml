name: GRIT Study Bot Scheduler

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 평일 오전 10시 (KST) -> UTC 01:00
    - cron: '30 14 * * 1-5' # 평일 오후 11시 30분 (KST) -> UTC 14:30
    - cron: '0 0 * * 1'     # 월요일 오전 9시 (KST) -> UTC 00:00 (주간 목표)
    - cron: '0 0 * * 2'     # 화요일 오전 9시 (KST) -> UTC 00:00 (화요일 공지)

  # 수동 실행 시 알람 종류를 선택할 수 있도록 개선
  workflow_dispatch:
    inputs:
      alarm_type:
        description: '실행할 알람 타입을 선택하세요'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening
          - weekly
          - tuesday

jobs:
  run-alarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install slack_sdk google-genai python-dotenv

      - name: Run Alarm Script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # GitHub Actions가 전달하는 스케줄 및 수동 입력값을 환경 변수로 주입
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL: ${{ github.event.inputs.alarm_type }}
        run: |
          # 현재 한국 시간(KST) 기준 '시(Hour, 00~23)' 추출
          CURRENT_HOUR_KST=$(TZ='Asia/Seoul' date +%H)
          
          # 1. 수동 실행 (workflow_dispatch) 처리: 시간 상관없이 무조건 실행
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "수동 트리거 실행: $MANUAL"
            python alarm.py "$MANUAL"
            
          # 2. 스케줄 실행 (cron) 처리: 스케줄 종류별로 '안전 시간대' 검사
          else
            echo "실행된 Cron 스케줄: $SCHEDULE / 현재 KST 시간: $CURRENT_HOUR_KST 시"
            
            if [ "$SCHEDULE" == "0 1 * * 1-5" ]; then
              # 오전 10시 알람 -> 10시~11시 사이에만 허용 (최대 1시간 59분 지연 허용)
              if [ "$CURRENT_HOUR_KST" == "10" ] || [ "$CURRENT_HOUR_KST" == "11" ]; then
                python alarm.py morning
              else
                echo "지연 발생! 현재 KST $CURRENT_HOUR_KST 시. 아침 알람 발송을 취소합니다."
              fi

            elif [ "$SCHEDULE" == "30 14 * * 1-5" ]; then
              # 오후 11시 30분 알람 -> 23시~00시 사이에만 허용
              if [ "$CURRENT_HOUR_KST" == "23" ] || [ "$CURRENT_HOUR_KST" == "00" ]; then
                python alarm.py evening
              else
                echo "지연 발생! 현재 KST $CURRENT_HOUR_KST 시. 저녁 알람 발송을 취소합니다."
              fi

            elif [ "$SCHEDULE" == "0 0 * * 1" ]; then
              # 월요일 오전 9시 알람 -> 09시~10시 사이에만 허용
              if [ "$CURRENT_HOUR_KST" == "09" ] || [ "$CURRENT_HOUR_KST" == "10" ]; then
                python alarm.py weekly
              else
                echo "지연 발생! 현재 KST $CURRENT_HOUR_KST 시. 주간 목표 알람 발송을 취소합니다."
              fi

            elif [ "$SCHEDULE" == "0 0 * * 2" ]; then
              # 화요일 오전 9시 알람 -> 09시~10시 사이에만 허용
              if [ "$CURRENT_HOUR_KST" == "09" ] || [ "$CURRENT_HOUR_KST" == "10" ]; then
                python alarm.py tuesday
              else
                echo "지연 발생! 현재 KST $CURRENT_HOUR_KST 시. 화요일 공지 알람 발송을 취소합니다."
              fi
              
            else
              echo "알 수 없는 스케줄입니다: $SCHEDULE"
              exit 1 
            fi
          fi
