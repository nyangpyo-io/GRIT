name: GRIT Study Bot Scheduler
on:
  schedule:
    - cron: '0 1 * * 1-5'   # 평일 오전 10시 (KST) -> UTC 01:00
    - cron: '30 14 * * 1-5' # 평일 오후 11시 30분 (KST) -> UTC 14:30
    - cron: '0 0 * * 1'     # 월요일 오전 9시 (KST) -> UTC 00:00 (주간 목표)
    - cron: '0 0 * * 2'     # 화요일 오전 9시 (KST) -> UTC 00:00 (화요일 공지)
  # 수동 실행 시 알람 종류를 선택할 수 있도록 개선
  workflow_dispatch:
    inputs:
      alarm_type:
        description: '실행할 알람 타입을 선택하세요'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening
          - weekly
          - tuesday
jobs:
  run-alarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install slack_sdk google-genai python-dotenv pytz
      - name: Run Alarm Script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MANUAL: ${{ github.event.inputs.alarm_type }}
        run: |
          # 현재 한국 시간(KST) 기준 시간 및 요일 추출
          CURRENT_HOUR_KST=$(TZ='Asia/Seoul' date +%H)
          CURRENT_MIN_KST=$(TZ='Asia/Seoul' date +%M)
          CURRENT_DOW=$(TZ='Asia/Seoul' date +%u)  # 1=월요일, 2=화요일, ..., 7=일요일
          
          echo "=== 실행 정보 ==="
          echo "Event: ${{ github.event_name }}"
          echo "현재 KST 시간: $CURRENT_HOUR_KST:$CURRENT_MIN_KST"
          echo "요일: $CURRENT_DOW (1=월, 2=화, 3=수, 4=목, 5=금)"
          
          # 1. 수동 실행 (workflow_dispatch) 처리
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "✅ 수동 트리거 실행: $MANUAL"
            python alarm.py "$MANUAL"
            
          # 2. 스케줄 실행 (cron) 처리: 시간대와 요일로 판단
          else
            EXECUTED=false
            
            # 월요일 오전 9시 (주간 목표) - 09:00~10:59 허용
            if [ "$CURRENT_DOW" == "1" ] && ([ "$CURRENT_HOUR_KST" == "09" ] || [ "$CURRENT_HOUR_KST" == "10" ]); then
              echo "✅ 월요일 주간 목표 알람 발송"
              python alarm.py weekly
              EXECUTED=true
              
            # 화요일 오전 9시 (화요일 공지) - 09:00~10:59 허용
            elif [ "$CURRENT_DOW" == "2" ] && ([ "$CURRENT_HOUR_KST" == "09" ] || [ "$CURRENT_HOUR_KST" == "10" ]); then
              echo "✅ 화요일 공지 알람 발송"
              python alarm.py tuesday
              EXECUTED=true
              
            # 평일 오전 10시 (아침 알람) - 10:00~11:59 허용
            elif [ "$CURRENT_HOUR_KST" == "10" ] || [ "$CURRENT_HOUR_KST" == "11" ]; then
              # 월요일과 화요일은 제외 (weekly, tuesday와 중복 방지)
              if [ "$CURRENT_DOW" != "1" ] && [ "$CURRENT_DOW" != "2" ]; then
                echo "✅ 아침 알람 발송"
                python alarm.py morning
                EXECUTED=true
              fi
              
            # 평일 오후 11시 30분 (저녁 알람) - 23:00~23:59만 허용 (자정 넘어가면 취소)
            elif [ "$CURRENT_HOUR_KST" == "23" ]; then
              echo "✅ 저녁 알람 발송"
              python alarm.py evening
              EXECUTED=true
            fi
            
            if [ "$EXECUTED" == "false" ]; then
              echo "⚠️ 실행 조건에 맞지 않음. 알람 발송 취소."
            fi
          fi
