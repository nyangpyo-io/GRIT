name: GRIT Study Bot Scheduler

on:
  schedule:
    - cron: '0 1 * * 1'     # 월요일 10시 KST → weekly
    - cron: '0 1 * * 2'     # 화요일 10시 KST → tuesday
    - cron: '0 1 * * 3,4,5' # 수~금 10시 KST → morning
    - cron: '0 14 * * 1-5'  # 평일 23시 KST → evening

  workflow_dispatch:
    inputs:
      alarm_type:
        description: '실행할 알람 타입을 선택하세요'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening
          - weekly
          - tuesday

jobs:
  run-alarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install slack_sdk google-genai python-dotenv pytz

      - name: Run Alarm Script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCHEDULE: ${{ github.event.schedule }}
          MANUAL: ${{ github.event.inputs.alarm_type }}
        run: |
          CURRENT_HOUR_KST=$(TZ='Asia/Seoul' date +%H)

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "수동 트리거 실행: $MANUAL"
            python alarm.py "$MANUAL"

          else
            echo "실행된 Cron: $SCHEDULE / 현재 KST: $CURRENT_HOUR_KST 시"

            if [ "$SCHEDULE" == "0 1 * * 1" ]; then
              if [ "$CURRENT_HOUR_KST" == "10" ] || [ "$CURRENT_HOUR_KST" == "11" ]; then
                python alarm.py weekly
              else
                echo "지연 발생! KST $CURRENT_HOUR_KST 시. 주간 알람 취소."
              fi

            elif [ "$SCHEDULE" == "0 1 * * 2" ]; then
              if [ "$CURRENT_HOUR_KST" == "10" ] || [ "$CURRENT_HOUR_KST" == "11" ]; then
                python alarm.py tuesday
              else
                echo "지연 발생! KST $CURRENT_HOUR_KST 시. 화요일 알람 취소."
              fi

            elif [ "$SCHEDULE" == "0 1 * * 3,4,5" ]; then
              if [ "$CURRENT_HOUR_KST" == "10" ] || [ "$CURRENT_HOUR_KST" == "11" ]; then
                python alarm.py morning
              else
                echo "지연 발생! KST $CURRENT_HOUR_KST 시. 아침 알람 취소."
              fi

            elif [ "$SCHEDULE" == "0 14 * * 1-5" ]; then
              if [ "$CURRENT_HOUR_KST" == "23" ]; then
                python alarm.py evening
              else
                echo "지연 발생! KST $CURRENT_HOUR_KST 시. 저녁 알람 취소."
              fi

            else
              echo "알 수 없는 스케줄: $SCHEDULE"
              exit 1
            fi
          fi
