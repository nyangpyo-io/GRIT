name: GRIT Study Bot Scheduler

on:
  schedule:
    - cron: '0 1 * * 1-5'   # 평일 오전 10시 (KST) -> UTC 01:00
    - cron: '30 14 * * 1-5' # 평일 오후 11시 30분 (KST) -> UTC 14:30
    - cron: '0 0 * * 1'     # 월요일 오전 9시 (KST) -> UTC 00:00 (주간 목표)
    - cron: '0 0 * * 2'     # 화요일 오전 9시 (KST) -> UTC 00:00 (화요일 공지) - 추가됨!
  workflow_dispatch:

jobs:
  run-alarm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install slack_sdk google-genai python-dotenv

      - name: Run Alarm Script
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 현재 시간(HOUR)과 요일(DAY, 1=월, 2=화...)을 가져옵니다.
          HOUR=$(date +%H)
          DAY=$(date +%u)

          if [ "$HOUR" == "00" ]; then
            if [ "$DAY" == "1" ]; then python alarm.py weekly;
            elif [ "$DAY" == "2" ]; then python alarm.py tuesday; # 화요일 전용 호출
            fi
          elif [ "$HOUR" == "01" ]; then python alarm.py morning;
          elif [ "$HOUR" == "14" ]; then python alarm.py evening;
          else python alarm.py morning;
          fi
